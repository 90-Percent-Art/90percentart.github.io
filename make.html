    <style>
        body { background: #ffffff; }
        #make-sketch { display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: auto; }
        #make-sketch canvas, #make-sketch svg { width: 100% !important; height: auto !important; border-radius: 12px; display: block; margin: 0 auto; flex: 0 0 auto; }
        .sketch-frame { background: #fdfdfd; border: 1px solid #ededed; border-radius: 12px; padding: 12px; }
        .control-card { background: #f8f9fb; border: 1px solid #e5e8ef; border-radius: 12px; padding: 18px; }
        .control-card h3 { letter-spacing: 0.4px; }
        .control-label { display: flex; align-items: center; justify-content: space-between; font-size: 0.95rem; margin-bottom: 4px; }
        .control-label span.value { font-weight: 600; color: #111; font-variant-numeric: tabular-nums; }
        .control-card input[type=range] { width: 100%; }
        .control-card input[type=color] { width: 100%; height: 34px; padding: 2px 3px; cursor: pointer; border-radius: 6px; }
        .param-group { border-top: 1px solid #e5e8ef; padding-top: 12px; margin-top: 12px; }
        .param-group:first-child { border-top: 0; padding-top: 0; margin-top: 0; }
        .param-group summary { list-style: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: 600; color: #111; }
        .param-group summary::-webkit-details-marker { display: none; }
        .param-group summary::after { content: '+'; font-size: 18px; line-height: 1; color: #666; }
        .param-group[open] summary::after { content: '−'; }
        .param-group-body { padding-top: 12px; }
        .control-actions .btn { margin: 4px 4px 0 0; font-size: 13px; padding: 5px 10px; }
        .control-actions { flex-wrap: nowrap; }
        .panel-tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid #e5e8ef; }
        .panel-tab { border: 0; background: transparent; color: #667085; padding: 8px 0; margin-right: 18px; font-size: 13px; font-weight: 700; letter-spacing: 0.02em; cursor: pointer; border-bottom: 2px solid transparent; }
        .panel-tab.active { color: #111; border-bottom-color: #111; }
        .panel-view { display: none; }
        .panel-view.active { display: block; }
        .code-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .code-toolbar .btn { margin: 0; font-size: 12px; padding: 5px 10px; }
        #codeEditor { width: 100%; min-height: 620px; resize: vertical; font-family: Consolas, "Courier New", monospace; font-size: 12px; line-height: 1.45; border: 1px solid #d7dce5; border-radius: 10px; padding: 12px; background: #fff; color: #111; }
        #codeStatus { min-height: 20px; font-size: 12px; color: #666; margin-top: 8px; }
        #codeStatus.error { color: #b42318; }
        #codeStatus.success { color: #067647; }
        .palette-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .palette-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; user-select: none; }
        .palette-swatch { width: 26px; height: 26px; border-radius: 4px; border: 2px solid #e0e0e0; transition: border-color 0.1s, box-shadow 0.1s; }
        .palette-item.selected .palette-swatch { border-color: #111; box-shadow: 0 0 0 1px #111; }
        .palette-item.at-max { opacity: 0.35; cursor: not-allowed; }
        .palette-label { font-size: 8px; color: #666; line-height: 1; text-align: center; }

        /* ── Print queue strip ── */
        #queueStrip { margin-top: 20px; margin-bottom: 24px; }
        #queueStrip h6 { font-size: 13px; font-weight: 700; color: #444; letter-spacing: 0.02em; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        #queueStrip h6 .q-count { font-weight: 400; color: #aaa; font-size: 12px; }
        #queueStrip h6 .q-refresh { background: none; border: none; color: #aaa; cursor: pointer; font-size: 15px; padding: 0 2px; line-height: 1; }
        #queueStrip h6 .q-refresh:hover { color: #555; }
        #queueCards { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px; }
        #queueCards::-webkit-scrollbar { height: 4px; }
        #queueCards::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
        .q-card { flex: 0 0 180px; background: #fff; border: 1px solid #e5e8ef; border-radius: 10px;
                  padding: 0 0 10px; position: relative; cursor: default; overflow: hidden;
                  transition: border-color 0.1s, box-shadow 0.1s; }

                                display: flex; align-items: center; justify-content: center;

    <!-- Controls + wiring (keeps same UI behavior as before) -->
    <script>
        const sliders = {
            shapeCount: document.getElementById('shapeCount'),
            orbitSize: document.getElementById('orbitSize'),
            speed: document.getElementById('speed'),
            hueShift: document.getElementById('hueShift'),
            trail: document.getElementById('trail')
        };

        const labels = {
            shapeCount: document.getElementById('shapeCountValue'),
            orbitSize: document.getElementById('orbitSizeValue'),
            speed: document.getElementById('speedValue'),
            hueShift: document.getElementById('hueShiftValue'),
            trail: document.getElementById('trailValue')
        };

        // global controls object used by sketches
        window.controls = {
            shapeCount: Number(sliders.shapeCount.value),
            orbitSize: Number(sliders.orbitSize.value),
            speed: Number(sliders.speed.value) / 1000,
            hueShift: Number(sliders.hueShift.value),
            trail: Number(sliders.trail.value)
        };

        // placeholder bridge used by UI to call the current sketch
        window.sketchAPI = {
            regenerate: function() {},
            togglePause: function() { return false; }
        };

        function syncControls() {
            window.controls.shapeCount = Number(sliders.shapeCount.value);
            window.controls.orbitSize = Number(sliders.orbitSize.value);
            window.controls.speed = Number(sliders.speed.value) / 1000;
            window.controls.hueShift = Number(sliders.hueShift.value);
            window.controls.trail = Number(sliders.trail.value);

            labels.shapeCount.textContent = sliders.shapeCount.value;
            labels.orbitSize.textContent = sliders.orbitSize.value;
            labels.speed.textContent = window.controls.speed.toFixed(3);
            labels.hueShift.textContent = sliders.hueShift.value;
            labels.trail.textContent = sliders.trail.value;
        }

        Object.keys(sliders).forEach(function(key) {
            sliders[key].addEventListener('input', function() {
                syncControls();
                // try to nudge the current sketch to regenerate on shapeCount change
                if (key === 'shapeCount' && typeof window.sketchAPI.regenerate === 'function') {
                    window.sketchAPI.regenerate();
                }
            });
        });

        document.getElementById('reseed').addEventListener('click', function() {
            if (window.sketchAPI && typeof window.sketchAPI.reseed === 'function') {
                window.sketchAPI.reseed();
            }
        });

        document.getElementById('randomize').addEventListener('click', function() {
            if (window.sketchAPI && typeof window.sketchAPI.randomize === 'function') {
                window.sketchAPI.randomize();
                return;
            }
            sliders.shapeCount.value = Math.floor(Math.random() * 120) + 40;
            sliders.orbitSize.value = Math.floor(Math.random() * 150) + 90;
            sliders.speed.value = Math.floor(Math.random() * 18) + 6;
            sliders.hueShift.value = Math.floor(Math.random() * 360);
            sliders.trail.value = Math.floor(Math.random() * 24) + 8;
            syncControls();
            if (typeof window.sketchAPI.regenerate === 'function') window.sketchAPI.regenerate();
        });

        document.getElementById('pause').addEventListener('click', function(event) {
            var isPaused = window.sketchAPI.togglePause();
            event.target.textContent = isPaused ? 'Resume' : 'Pause';
        });

        document.getElementById('savePng').addEventListener('click', function() {
            if (window.sketchAPI && typeof window.sketchAPI.savePNG === 'function') {
                window.sketchAPI.savePNG();
            }
        });

        document.getElementById('saveSvg').addEventListener('click', function() {
            if (window.sketchAPI && typeof window.sketchAPI.saveSVG === 'function') {
                window.sketchAPI.saveSVG();
            } else {
                alert('SVG export not available in this sketch.');
            }
        });

        // ── Print queue ────────────────────────────────────────────────────────
        (function() {
            var STORAGE_URL_KEY = 'pl0tb0t_queue_url';
            var STORAGE_KEY_KEY = 'pl0tb0t_queue_key';
            var STORAGE_DELETE_TOKENS_KEY = 'pl0tb0t_queue_delete_tokens';
            var DEFAULT_URL = 'http://pl0tb0tpi5:5001';
            var DEFAULT_KEY = '';

            function getUrl() { return (localStorage.getItem(STORAGE_URL_KEY) || DEFAULT_URL).replace(/\/$/, ''); }
            function getKey() { return localStorage.getItem(STORAGE_KEY_KEY) || DEFAULT_KEY; }
            function queueHeaders(extra) {
                var h = extra ? Object.assign({}, extra) : {};
                var key = getKey();
                if (key) h['X-API-Key'] = key;
                return h;
            }
            function getDeleteTokens() {
                try { return JSON.parse(localStorage.getItem(STORAGE_DELETE_TOKENS_KEY) || '{}'); }
                catch(e) { return {}; }
            }
            function saveDeleteToken(jobId, token) {
                if (!jobId || !token) return;
                var tokens = getDeleteTokens();
                tokens[jobId] = token;
                localStorage.setItem(STORAGE_DELETE_TOKENS_KEY, JSON.stringify(tokens));
            }
            function forgetDeleteToken(jobId) {
                var tokens = getDeleteTokens();
                delete tokens[jobId];
                localStorage.setItem(STORAGE_DELETE_TOKENS_KEY, JSON.stringify(tokens));
            }

            function loadQueueCfg() {
                document.getElementById('queueUrl').value = getUrl();
                document.getElementById('queueKey').value = getKey();
            }

            function queueStatus(msg, color) {
                var el = document.getElementById('queueStatus');
                el.style.display = msg ? 'block' : 'none';
                el.style.color = color || '#555';
                el.textContent = msg;
            }

            document.getElementById('queueSaveCfg').addEventListener('click', function() {
                localStorage.setItem(STORAGE_URL_KEY, document.getElementById('queueUrl').value.trim().replace(/\/$/, ''));
                localStorage.setItem(STORAGE_KEY_KEY, document.getElementById('queueKey').value.trim());
                queueStatus('Queue settings saved.', '#2a7');
                setTimeout(function(){ queueStatus(''); }, 2500);
            });

            // ── SVG capture (no download side-effect) ─────────────────────────
            // Different sketches trigger downloads differently:
            //   Pattern A (whirls, lineArrays…): body.appendChild(a) then a.click()
            //   Pattern B (artproofs, circlesFromLines…): a.click() directly, no appendChild
            //
            // Intercepting HTMLAnchorElement.prototype.click catches BOTH patterns.
            // URL.createObjectURL is also intercepted so we can read the blob before
            // revokeObjectURL (called immediately in Pattern B) invalidates the URL.
            function captureSvgFromSaveSVG() {
                return new Promise(function(resolve, reject) {
                    if (!window.sketchAPI || typeof window.sketchAPI.saveSVG !== 'function')
                        return reject(new Error('saveSVG not available for this sketch'));

                    var origCOU   = URL.createObjectURL;
                    var origClick = HTMLAnchorElement.prototype.click;
                    var capturedText = null;
                    var done = false;

                    var cleanup = function() {
                        URL.createObjectURL = origCOU;
                        HTMLAnchorElement.prototype.click = origClick;
                    };
                    var timer = setTimeout(function() {
                        if (!done) { cleanup(); reject(new Error('SVG capture timed out')); }
                    }, 8000);

                    // Step 1: read blob text before revokeObjectURL can invalidate it
                    URL.createObjectURL = function(blob) {
                        URL.createObjectURL = origCOU;
                        var realUrl = origCOU(blob);          // real URL for revokeObjectURL
                        blob.text().then(function(t) { capturedText = t; });
                        return realUrl;
                    };

                    // Step 2: suppress the anchor click (catches both patterns)
                    HTMLAnchorElement.prototype.click = function() {
                        if (this.download) {                  // it's a download anchor
                            HTMLAnchorElement.prototype.click = origClick;
                            done = true;
                            clearTimeout(timer);
                            // blob.text() is async — give it 200ms then resolve
                            setTimeout(function() {
                                cleanup();
                                if (capturedText && capturedText.length > 50) resolve(capturedText);
                                else reject(new Error('SVG blob was empty'));
                            }, 200);
                            return;                           // suppress download
                        }
                        return origClick.call(this);
                    };

                    try { window.sketchAPI.saveSVG(); }
                    catch(e) { cleanup(); done = true; clearTimeout(timer); reject(e); }
                });
            }

            function getSvgString() {
                var svgEl = document.querySelector('#make-sketch svg');
                if (svgEl) return Promise.resolve(new XMLSerializer().serializeToString(svgEl));
                return captureSvgFromSaveSVG();
            }

            // ── Embed / extract editor snapshot inside SVG ────────────────────
            function embedSnapshot(svgStr, sketchId, params) {
                try {
                    var payload = btoa(unescape(encodeURIComponent(JSON.stringify({sketch: sketchId, params: params}))));
                    return svgStr.replace(/<\/svg>/, '\n<!-- pl0tb0t-snapshot ' + payload + ' -->\n</svg>');
                } catch(e) { return svgStr; }
            }

            function extractSnapshot(svgText) {
                var m = svgText.match(/<!--\s*pl0tb0t-snapshot\s+([A-Za-z0-9+/=]+)\s*-->/);
                if (!m) return null;
                try { return JSON.parse(decodeURIComponent(escape(atob(m[1])))); }
                catch(e) { return null; }
            }

            // ── Send to queue ─────────────────────────────────────────────────
            document.getElementById('sendToQueue').addEventListener('click', function() {
                var btn = this;
                btn.disabled = true;
                queueStatus('Generating SVG…', '#888');

                var sketchId  = (document.getElementById('sketchSelector') || {}).value || 'sketch';
                var paperSize = (document.getElementById('paperSize') || {}).value || '8.5x11';
                var snapshot  = window.sketchAPI && window.sketchAPI.getParamsSnapshot
                    ? window.sketchAPI.getParamsSnapshot() : [];
                var recipe = window.sketchAPI && typeof window.sketchAPI.getRecipe === 'function'
                    ? window.sketchAPI.getRecipe() : { sketch: sketchId, params: snapshot };

                getSvgString().then(function(svgStr) {
                    svgStr = embedSnapshot(svgStr, sketchId, recipe && Array.isArray(recipe.params) ? recipe.params : snapshot);
                    try { sessionStorage.setItem('pl0tb0t_last_queued_svg', svgStr); } catch(e) {}
                    queueStatus('Sending…', '#888');
                    return fetch(getUrl() + '/jobs', {
                        method: 'POST',
                        headers: queueHeaders({ 'Content-Type': 'application/json' }),
                        body: JSON.stringify({ svg: svgStr, recipe: recipe, sketch_name: sketchId, paper_size: paperSize, orientation: 'portrait' })
                    });
                }).then(function(r) {
                    if (!r.ok) {
                        return r.json().catch(function(){ return {}; }).then(function(data) {
                            throw new Error((data && data.error) ? data.error : ('Server ' + r.status));
                        });
                    }
                    return r.json();
                }).then(function(data) {
                    var jobId = data.job_id || data.id;
                    saveDeleteToken(jobId, data.delete_token);
                    queueStatus('✓ Queued!  Job #' + jobId, '#2a7');
                    setTimeout(function(){ queueStatus(''); }, 5000);
                    fetchAndRenderStrip();
                }).catch(function(err) {
                    queueStatus('Queue error: ' + err.message, '#c00');
                    document.getElementById('queueConfigPanel').open = true;
                }).finally(function() { btn.disabled = false; });
            });

            // ── Load job back into editor ──────────────────────────────────────
            function applyRecipeToEditor(recipe) {
                var sel = document.getElementById('sketchSelector');
                var apply = function() {
                    if (window.sketchAPI && typeof window.sketchAPI.applyRecipe === 'function') {
                        window.sketchAPI.applyRecipe(recipe);
                    } else if (window.sketchAPI && window.sketchAPI.applyParamsSnapshot) {
                        window.sketchAPI.applyParamsSnapshot(recipe.params);
                    }
                };
                if (sel && recipe.sketch && sel.value !== recipe.sketch) {
                    sel.value = recipe.sketch;
                    sel.dispatchEvent(new Event('change'));
                    setTimeout(apply, 600);
                } else {
                    apply();
                }
            }

            function loadJobIntoEditor(jobId) {
                fetch(getUrl() + '/jobs/' + jobId + '/recipe', { headers: queueHeaders() })
                    .then(function(r) {
                        if (!r.ok) throw new Error('recipe unavailable');
                        return r.json();
                    })
                    .then(function(recipe) {
                        applyRecipeToEditor(recipe);
                    })
                    .catch(function() {
                        return loadJobSnapshotFromSvg(jobId);
                    });
            }

            function loadJobSnapshotFromSvg(jobId) {
                return fetch(getUrl() + '/jobs/' + jobId + '/svg', { headers: queueHeaders() })
                    .then(function(r) { return r.text(); })
                    .then(function(svgText) {
                        var snap = extractSnapshot(svgText);
                        if (!snap) { alert('No editor snapshot found in this job — it may have been queued before this feature was added.'); return; }
                        applyRecipeToEditor({ sketch: snap.sketch, params: snap.params });
                    }).catch(function(e) { alert('Load failed: ' + e.message); });
            }

            // ── Queue strip ───────────────────────────────────────────────────
            var _stripTimer = null;
            var _stripFetchInFlight = false;
            var QUEUE_REFRESH_MS = 3000;
            var _thumbBlobUrls = {};   // jobId → blob URL (cleaned up on re-render)

            function timeAgo(ts) {
                if (!ts) return '';
                var d = Date.now() / 1000 - ts;
                if (d < 60)    return 'just now';
                if (d < 3600)  return Math.floor(d / 60) + 'm ago';
                if (d < 86400) return Math.floor(d / 3600) + 'h ago';
                return Math.floor(d / 86400) + 'd ago';
            }

            function formatBytes(n) {
                n = Number(n || 0);
                if (!n) return '';
                if (n < 1024) return n + ' B';
                if (n < 1024 * 1024) return (n / 1024).toFixed(n < 10 * 1024 ? 1 : 0) + ' KB';
                return (n / (1024 * 1024)).toFixed(n < 10 * 1024 * 1024 ? 1 : 0) + ' MB';
            }

            function loadThumb(jobId, imgEl) {
                if (_thumbBlobUrls[jobId]) { imgEl.src = _thumbBlobUrls[jobId]; return; }
                fetch(getUrl() + '/jobs/' + jobId + '/svg', { headers: queueHeaders() })
                    .then(function(r) { return r.blob(); })
                    .then(function(blob) {
                        var url = URL.createObjectURL(blob);
                        _thumbBlobUrls[jobId] = url;
                        imgEl.src = url;
                    }).catch(function() { imgEl.parentNode && imgEl.parentNode.removeChild(imgEl); });
            }

            function renderQueueStrip(jobs) {
                var container = document.getElementById('queueCards');
                var empty     = document.getElementById('queueEmpty');
                var countEl   = document.getElementById('queueCount');
                if (!container) return;

                // Revoke blob URLs for jobs no longer in the list
                var currentIds = (jobs || []).map(function(j) { return j.id; });
                Object.keys(_thumbBlobUrls).forEach(function(id) {
                    if (currentIds.indexOf(id) === -1) {
                        URL.revokeObjectURL(_thumbBlobUrls[id]);
                        delete _thumbBlobUrls[id];
                    }
                });

                Array.from(container.querySelectorAll('.q-card')).forEach(function(c) { c.remove(); });

                if (!jobs || jobs.length === 0) {
                    empty.style.display = '';
                    countEl.textContent = '';
                    return;
                }
                empty.style.display = 'none';
                countEl.textContent = jobs.length + ' job' + (jobs.length === 1 ? '' : 's');

                var statusDot = { queued: '●', plotting: '▶', done: '✓', error: '✕' };
                jobs.forEach(function(job) {
                    var st   = job.status || 'queued';
                    var card = document.createElement('div');
                    card.className = 'q-card q-' + st;
                    card.dataset.jobId = job.id;

                    // Thumbnail
                    var thumb = document.createElement('img');
                    thumb.className = 'q-thumb';
                    thumb.alt = '';
                    loadThumb(job.id, thumb);
                    card.appendChild(thumb);

                    // Body
                    var body = document.createElement('div');
                    body.className = 'q-card-body';

                    var name = document.createElement('div');
                    name.className = 'q-card-name';
                    name.textContent = job.sketch_name || 'Untitled';
                    body.appendChild(name);

                    var meta = document.createElement('div');
                    meta.className = 'q-card-meta';
                    var sizeText = formatBytes(job.file_size || job.file_size_bytes);
                    meta.textContent = [
                        job.paper_size || '',
                        job.orientation || '',
                        sizeText
                    ].filter(Boolean).join(' · ');
                    body.appendChild(meta);
                    card.appendChild(body);

                    // Footer: status + load button
                    var footer = document.createElement('div');
                    footer.className = 'q-card-footer';

                    var status = document.createElement('div');
                    status.className = 'q-card-status qs-' + st;
                    status.textContent = (statusDot[st] || '●') + ' ' + st + ' · ' + timeAgo(job.created_at);
                    footer.appendChild(status);

                    var load = document.createElement('button');
                    load.className = 'q-card-load';
                    load.title = 'Load into editor';
                    load.textContent = '↩ Edit';
                    load.addEventListener('click', function(e) {
                        e.stopPropagation();
                        loadJobIntoEditor(job.id);
                    });
                    footer.appendChild(load);
                    card.appendChild(footer);

                    // Delete button: visible only for this browser's submissions,
                    // or when an admin key is configured for the current queue.
                    var deleteToken = getDeleteTokens()[job.id];
                    if (deleteToken || getKey()) {
                        var del = document.createElement('button');
                        del.className = 'q-card-del';
                        del.title = deleteToken ? 'Remove your queue item' : 'Admin remove from queue';
                        del.textContent = '✕';
                        del.addEventListener('click', function(e) {
                            e.stopPropagation();
                            if (!confirm('Remove “' + (job.sketch_name || 'this job') + '” from the queue?')) return;
                            var headers = queueHeaders();
                            if (deleteToken) headers['X-Delete-Token'] = deleteToken;
                            fetch(getUrl() + '/jobs/' + job.id, { method: 'DELETE', headers: headers })
                                .then(function(r) {
                                    if (!r.ok) {
                                        return r.json().catch(function(){ return {}; }).then(function(data) {
                                            throw new Error((data && data.error) ? data.error : ('Server ' + r.status));
                                        });
                                    }
                                    forgetDeleteToken(job.id);
                                    fetchAndRenderStrip();
                                })
                                .catch(function(err) { alert('Delete failed: ' + err.message); });
                        });
                        card.appendChild(del);
                    }

                    container.appendChild(card);
                });
            }

            function fetchAndRenderStrip() {
                if (_stripFetchInFlight || document.hidden) return;
                _stripFetchInFlight = true;
                fetch(getUrl() + '/jobs', { headers: queueHeaders() })
                    .then(function(r) { return r.json(); })
                    .then(function(jobs) { renderQueueStrip(jobs); })
                    .catch(function() {})
                    .finally(function() { _stripFetchInFlight = false; });
            }

            document.getElementById('queueRefreshBtn').addEventListener('click', fetchAndRenderStrip);
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) fetchAndRenderStrip();
            });
            window.addEventListener('focus', fetchAndRenderStrip);

            loadQueueCfg();
            fetchAndRenderStrip();
            _stripTimer = setInterval(fetchAndRenderStrip, QUEUE_REFRESH_MS);
        })();
        // ──────────────────────────────────────────────────────────────────────

        const panelTabs = Array.from(document.querySelectorAll('.panel-tab'));
        const panelViews = Array.from(document.querySelectorAll('.panel-view'));
        const codeEditor = document.getElementById('codeEditor');
        const codeStatus = document.getElementById('codeStatus');
        const reloadCodeButton = document.getElementById('reloadCode');
        const applyCodeButton = document.getElementById('applyCode');
        const resetCodeButton = document.getElementById('resetCode');
        const sketchSelector = document.getElementById('sketchSelector');

        function setCodeStatus(message, type) {
            codeStatus.textContent = message || '';
            codeStatus.className = type ? type : '';
        }

        function setActivePanel(viewId) {
            panelTabs.forEach(function(tab) {
                var active = tab.getAttribute('data-view') === viewId;
                tab.classList.toggle('active', active);
                tab.setAttribute('aria-selected', active ? 'true' : 'false');
            });
            panelViews.forEach(function(view) {
                view.classList.toggle('active', view.id === viewId);
            });
        }

        panelTabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                setActivePanel(tab.getAttribute('data-view'));
            });
        });

        function currentScriptPath() {
            var option = sketchSelector.options[sketchSelector.selectedIndex];
            return option ? option.getAttribute('data-script') : null;
        }

        async function loadCurrentSketchSource() {
            var path = currentScriptPath();
            if (!path) {
                codeEditor.value = '';
                setCodeStatus('No script path found for this sketch.', 'error');
                return '';
            }
            try {
                setCodeStatus('Loading source...');
                var response = await fetch(path, { cache: 'no-store' });
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var source = await response.text();
                codeEditor.value = source;
                setCodeStatus('Loaded ' + path, 'success');
                return source;
            } catch (error) {
                setCodeStatus('Could not load sketch source: ' + error.message, 'error');
                return '';
            }
        }

        function applyCurrentSketchSource() {
            try {
                var source = codeEditor.value;
                if (!source.trim()) {
                    setCodeStatus('Code editor is empty.', 'error');
                    return;
                }
                (0, eval)(source);
                if (window.makeSketchApp && typeof window.makeSketchApp.remakeCurrent === 'function') {
                    window.makeSketchApp.remakeCurrent();
                } else if (typeof sketchSelector.dispatchEvent === 'function') {
                    sketchSelector.dispatchEvent(new Event('change'));
                }
                setCodeStatus('Applied current code to this browser session.', 'success');
            } catch (error) {
                setCodeStatus('Apply failed: ' + error.message, 'error');
            }
        }

        reloadCodeButton.addEventListener('click', loadCurrentSketchSource);
        applyCodeButton.addEventListener('click', applyCurrentSketchSource);
        resetCodeButton.addEventListener('click', function() {
            loadCurrentSketchSource().then(function() {
                try {
                    if (!codeEditor.value.trim()) {
                        setCodeStatus('Reset failed: source is empty.', 'error');
                        return;
                    }
                    (0, eval)(codeEditor.value);
                    if (window.makeSketchApp && typeof window.makeSketchApp.remakeCurrent === 'function') {
                        window.makeSketchApp.remakeCurrent();
                    }
                    setCodeStatus('Reset current sketch to file source.', 'success');
                } catch (error) {
                    setCodeStatus('Reset failed: ' + error.message, 'error');
                }
            });
        });

        sketchSelector.addEventListener('change', function() {
            loadCurrentSketchSource();
        });

        // initial sync
        syncControls();
        loadCurrentSketchSource();
    </script>

    <script src="scripts/sketches/whirls.js"></script>
    <script src="scripts/sketches/artproofs.js"></script>
    <script src="scripts/sketches/unbuiltSculptures.js"></script>

    <script src="scripts/makeSketch.js"></script>
