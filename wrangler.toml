name = "pl0tb0t-queue"
main = "workers/queue-worker.js"
compatibility_date = "2026-05-15"
workers_dev = true

# Create and bind a KV namespace before deploying:
#   npx wrangler kv namespace create QUEUE_KV
# Then paste the returned id below.
#
[[kv_namespaces]]
binding = "QUEUE_KV"
id = "9f8cf04a9f8e4da1b8bbae8d42b39a6c"

[vars]
MAX_ACTIVE = "50"
MAX_SVG_BYTES = "10000000"

# Set the admin token as a secret, not in this file:
#   npx wrangler secret put ADMIN_TOKEN
